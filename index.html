function pokreniSinhronizaciju() {

        prikaziSve();
        return;

    .then(data => {
        if (data) {
            turnir = data;
            if(!turnir.Nokaut) turnir.Nokaut = JSON.parse(JSON.stringify(strukturaTurnira.Nokaut));

            fetch(FIREBASE_URL + 'turnir.json', { method: 'PUT', body: JSON.stringify(strukturaTurnira) });

function provjeriDaLiJeGrupaZavrsena(imeGrupe) {
    const grupa = turnir[imeGrupe];
    if(!grupa || !grupa.utakmice) return false;
    
    // Odredi potreban broj utakmica na osnovu broja timova u grupi
    const ocekivaniBrojUtakmica = grupa.timovi.length === 3 ? 3 : 6;
    
    let odigranoMeca = 0;
    grupa.utakmice.forEach(utakmica => {
        if (utakmica.golDomacin !== "" && utakmica.golGost !== "" && utakmica.golDomacin !== null && utakmica.golGost !== null) {
            odigranoMeca++;
        }
    });
    
    return odigranoMeca === ocekivaniBrojUtakmica;
}

function izracunajTabelu(imeGrupe) {
    const grupa = turnir[imeGrupe];
    let tabela = {};
    if(!grupa || !grupa.timovi) return [];
    grupa.timovi.forEach(tim => { tabela[tim] = { ime: tim, odigrano: 0, pobjede: 0, remiji: 0, porazi: 0, dg: 0, pg: 0, bodovi: 0 }; });
    if(grupa.utakmice) {
        grupa.utakmice.forEach(utakmica => {
            if (utakmica.golDomacin !== "" && utakmica.golGost !== "" && utakmica.golDomacin !== null && utakmica.golGost !== null) {
                const gd = parseInt(utakmica.golDomacin); const gg = parseInt(utakmica.golGost);
                tabela[utakmica.domacin].odigrano++; tabela[utakmica.gost].odigrano++;
                tabela[utakmica.domacin].dg += gd; tabela[utakmica.domacin].pg += gg;
                tabela[utakmica.gost].dg += gg; tabela[utakmica.gost].pg += gd;
                if (gd > gg) { tabela[utakmica.domacin].pobjede++; tabela[utakmica.domacin].bodovi += 3; tabela[utakmica.gost].porazi++; }
                else if (gd < gg) { tabela[utakmica.gost].pobjede++; tabela[utakmica.gost].bodovi += 3; tabela[utakmica.domacin].porazi++; }
                else { tabela[utakmica.domacin].remiji++; tabela[utakmica.gost].remiji++; tabela[utakmica.domacin].bodovi += 1; tabela[utakmica.gost].bodovi += 1; }
            }
        });
    }
    return Object.values(tabela).sort((a, b) => {
        if (b.bodovi !== a.bodovi) return b.bodovi - a.bodovi;
        const grA = a.dg - a.pg; const grB = b.dg - b.pg;
        if (grB !== grA) return grB - grA;
        return b.dg - a.dg;
    });
}

    cf[0].domacin = nadjiPobjednika(of[0]) || "Pobjednik OF1"; cf[0].gost = nadjiPobjednika(of[1]) || "Pobjednik OF2";
    cf[1].domacin = nadjiPobjednika(of[2]) || "Pobjednik OF3"; cf[1].gost = nadjiPobjednika(of[3]) || "Pobjednik OF4";
    cf[2].domacin = nadjiPobjednika(of[4]) || "Pobjednik OF5"; cf[2].gost = nadjiPobjednika(of[5]) || "Pobjednik OF6";
    cf[3].domacin = nadjiPobjednika(of[6]) || "Pobjednik OF7"; cf[3].gost = nadjiPobjednika(of[7]) || "Pobjednik OF8";

    const pf = turnir.Nokaut["Polufinale"];
    pf[0].domacin = nadjiPobjednika(cf[0]) || "Pobjednik Q1"; pf[0].gost = nadjiPobjednika(cf[1]) || "Pobjednik Q2";
    pf[1].domacin = nadjiPobjednika(cf[2]) || "Pobjednik Q3"; pf[1].gost = nadjiPobjednika(cf[3]) || "Pobjednik Q4";

    turnir.Nokaut["Trece Mjesto"][0].domacin = nadjiPorazenog(pf[0]) || "Poraženi S1";
    turnir.Nokaut["Trece Mjesto"][0].gost = nadjiPorazenog(pf[1]) || "Poraženi S2";
    
    turnir.Nokaut["Finale"][0].domacin = nadjiPobjednika(pf[0]) || "Pobjednik S1";
    turnir.Nokaut["Finale"][0].gost = nadjiPobjednika(pf[1]) || "Pobjednik S2";
}

function azurirajRezultat(imeGrupe, utakmicaId, isDomacin, vrijednost, indexGrupe) {
    if(!isAdmin) return;
    trenutnoAktivnaGrupaIndex = indexGrupe;
    const utakmica = turnir[imeGrupe].utakmice.find(u => u.id === utakmicaId);
    if (utakmica) {
        if (isDomacin) { utakmica.golDomacin = vrijednost === "" ? "" : parseInt(vrijednost); }
        else { utakmica.golGost = vrijednost === "" ? "" : parseInt(vrijednost); }
        spremiUBazu();
    }
}

function azurirajNokautRezultat(kategorija, utakmicaId, tipPolja, vrijednost) {
    if(!isAdmin) return;
    const utakmica = turnir.Nokaut[kategorija].find(u => u.id === utakmicaId);
    if(utakmica) {
        if(tipPolja === 'gd') utakmica.golDomacin = vrijednost === "" ? "" : parseInt(vrijednost);
        if(tipPolja === 'gg') utakmica.golGost = vrijednost === "" ? "" : parseInt(vrijednost);
        if(tipPolja === 'pd') utakmica.penaliDomacin = vrijednost === "" ? "" : parseInt(vrijednost);
        if(tipPolja === 'pg') utakmica.penaliGost = vrijednost === "" ? "" : parseInt(vrijednost);
        
        if(utakmica.golDomacin !== utakmica.golGost) {
            utakmica.penaliDomacin = "";
            utakmica.penaliGost = "";
        }
        spremiUBazu();
    }
}

function spremiUBazu() {
    osvjeziImenaUNokautu();
    prikaziSve();
    if (FIREBASE_URL !== "TVOJ_FIREBASE_URL_LINK_OVDJE/") {
        fetch(FIREBASE_URL + 'turnir.json', { method: 'PUT', body: JSON.stringify(turnir) });
    }
}

function prikaziSve() {
    if(trenutnaFaza === "grupna") { prikaziGrupnuFazu(); } 
    else { generisiNokautPanele(); }
}

function prikaziGrupnuFazu() {
    const tabsUl = document.getElementById('groupTabs');
    const contentDiv = document.getElementById('groupTabsContent');
    tabsUl.innerHTML = ""; contentDiv.innerHTML = "";

    Object.keys(turnir).forEach((imeGrupe, indeks) => {
        if(!imeGrupe.startsWith("Grupa ")) return;
        const tabId = `tab-${indeks}`; const panelId = `panel-${indeks}`; const isAktivan = indeks === trenutnoAktivnaGrupaIndex;

        tabsUl.innerHTML += `
            <li class="nav-item" role="presentation">
                <button class="nav-link ${isAktivan ? 'active' : ''}" id="${tabId}" data-bs-toggle="pill" data-bs-target="#${panelId}" type="button" role="tab" onclick="trenutnoAktivnaGrupaIndex=${indeks}">
                    ${imeGrupe.replace("Grupa ", "")}
                </button>
            </li>
        `;

        const sortiranaTabela = izracunajTabelu(imeGrupe);
        let tabelaHtml = `
            <div class="card p-3 mb-3">
                <h5 class="card-title">${imeGrupe} - Tabela</h5>
                <div class="table-responsive">
                    <table class="table table-striped table-hover text-center align-middle">
                        <thead><tr><th>#</th><th class="text-start">Tim</th><th>OU</th><th>P</th><th>N</th><th>I</th><th>GR</th><th>B</th></tr></thead>
                        <tbody>
        `;

        sortiranaTabela.forEach((tim, i) => {
            if (tim && tim.ime) {
                tabelaHtml += `
                    <tr>
                        <td>${i + 1}</td>
                        <td class="text-start fw-bold team-name text-truncate" style="max-width: 140px;">${tim.ime}</td>
                        <td>${tim.odigrano}</td><td>${tim.pobjede}</td><td>${tim.remiji}</td><td>${tim.porazi}</td>
                        <td class="${(tim.dg - tim.pg) > 0 ? 'text-success' : (tim.dg - tim.pg) < 0 ? 'text-danger' : ''}">${tim.dg - tim.pg}</td>
                        <td class="fw-bold" style="color: #d4af37;">${tim.bodovi}</td>
                    </tr>
                `;
            }
        });
        tabelaHtml += `</tbody></table></div></div>`;

        let utakmiceHtml = `<div class="card p-3"><h5 class="card-title">Unos Rezultata</h5>`;
        if(turnir[imeGrupe].utakmice) {
            turnir[imeGrupe].utakmice.forEach(u => {
                utakmiceHtml += `
                    <div class="row match-row d-flex justify-content-between text-center mx-0">
                        <div class="col-4 text-end match-team-name text-truncate px-1 align-self-center">${u.domacin}</div>
                        <div class="col-4 d-flex justify-content-center align-items-center px-1">
                            <input type="number" class="form-control form-control-sm score-input mx-1" value="${u.golDomacin}" oninput="azurirajRezultat('${imeGrupe}', '${u.id}', true, this.value, ${indeks})" min="0" inputmode="numeric" ${!isAdmin ? 'disabled' : ''}>
                            <span class="fw-bold text-muted">:</span>
                            <input type="number" class="form-control form-control-sm score-input mx-1" value="${u.golGost}" oninput="azurirajRezultat('${imeGrupe}', '${u.id}', false, this.value, ${indeks})" min="0" inputmode="numeric" ${!isAdmin ? 'disabled' : ''}>
                        </div>
                        <div class="col-4 text-start match-team-name text-truncate px-1 align-self-center">${u.gost}</div>
                    </div>
                `;
            });
        }
        utakmiceHtml += `</div>`;

        contentDiv.innerHTML += `<div class="tab-pane fade ${isAktivan ? 'show active' : ''}" id="${panelId}" role="tabpanel">${tabelaHtml}${utakmiceHtml}</div>`;
    });
}

function generisiNokautPanele() {
    if(!turnir.Nokaut) return;
    
    document.getElementById('panel-of').innerHTML = napraviHtmlZaKategoriju("Osmina Finala");
    document.getElementById('panel-cf').innerHTML = napraviHtmlZaKategoriju("Cetvrtfinale");
    document.getElementById('panel-pf').innerHTML = napraviHtmlZaKategoriju("Polufinale");
    
    let finaleHtml = "";
    
    finaleHtml += `<h4 class="text-center my-3 fw-bold text-uppercase" style="color: #a0aec0; letter-spacing: 1px;">Utakmica za treće mjesto</h4>`;
    finaleHtml += napraviHtmlZaKategoriju("Trece Mjesto");
    
    finaleHtml += `<div class="my-4"></div>`;
    
    finaleHtml += `<h4 class="text-center my-3 fw-bold text-uppercase" style="color: #d4af37; letter-spacing: 1px;">Finalna utakmica</h4>`;
    finaleHtml += napraviHtmlZaKategoriju("Finale");
    
    document.getElementById('panel-fn').innerHTML = finaleHtml;
}

function napraviHtmlZaKategoriju(kategorija) {
    let ispisHtml = "";
    if(!turnir.Nokaut[kategorija]) return "";

    turnir.Nokaut[kategorija].forEach(u => {
        const isNereseno = (u.golDomacin !== "" && u.golGost !== "" && parseInt(u.golDomacin) === parseInt(u.golGost));
        
        let pobjednikId = "";
        if (parseInt(u.golDomacin) > parseInt(u.golGost)) pobjednikId = "d";
        else if (parseInt(u.golDomacin) < parseInt(u.golGost)) pobjednikId = "g";
        else if (isNereseno && u.penaliDomacin !== "" && u.penaliGost !== "") {
            if (parseInt(u.penaliDomacin) > parseInt(u.penaliGost)) pobjednikId = "d";
            else if (parseInt(u.penaliDomacin) < parseInt(u.penaliGost)) pobjednikId = "g";
        }

        const klasaD = pobjednikId === "d" ? "winner-highlight" : "";
        const klasaG = pobjednikId === "g" ? "winner-highlight" : "";

        // Sakrij unos rezultata u Nokautu ako timovi još uvijek nisu poznati (npr. piše "A1" ili je prazno)
        const daLiJeMecSpreman = u.domacin !== "" && u.domacin !== null && !u.domacin.match(/^[A-H][1-2]$/) && !u.domacin.startsWith("Pobjednik") && !u.domacin.startsWith("Poraženi");

        ispisHtml += `
            <div class="card p-3 mb-2">
                ${u.naslov ? `<div class="fw-bold mb-2 text-muted text-uppercase small">${u.naslov}</div>` : ''}
                <div class="row match-row d-flex justify-content-between text-center mx-0" style="border-left-color: #1e3a8a;">
                    <div class="col-4 text-end match-team-name text-truncate px-1 align-self-center ${klasaD}">
                        ${u.oznakaD && !daLiJeMecSpreman ? `<span class="badge bg-secondary me-1 text-light">${u.oznakaD}</span>` : ''}${u.domacin}
                    </div>
                    <div class="col-4 d-flex justify-content-center align-items-center px-1">
                        <input type="number" class="form-control form-control-sm score-input mx-1" value="${u.golDomacin}" oninput="azurirajNokautRezultat('${kategorija}', '${u.id}', 'gd', this.value)" min="0" inputmode="numeric" ${!isAdmin || !daLiJeMecSpreman ? 'disabled' : ''}>
                        <span class="fw-bold text-muted">:</span>
                        <input type="number" class="form-control form-control-sm score-input mx-1" value="${u.golGost}" oninput="azurirajNokautRezultat('${kategorija}', '${u.id}', 'gg', this.value)" min="0" inputmode="numeric" ${!isAdmin || !daLiJeMecSpreman ? 'disabled' : ''}>
                    </div>
                    <div class="col-4 text-start match-team-name text-truncate px-1 align-self-center ${klasaG}">
                        ${u.gost} ${u.oznakaG && !daLiJeMecSpreman ? `<span class="badge bg-secondary ms-1 text-light">${u.oznakaG}</span>` : ''}
                    </div>
                </div>
        `;

        if (isNereseno && daLiJeMecSpreman) {
            ispisHtml += `
                <div class="penalty-box text-center">
                    <div class="penalty-title mb-1">⚽ PENALI</div>
            `;
            
            if (isAdmin) {
                ispisHtml += `
                    <div class="d-flex justify-content-center align-items-center my-2">
                        <span class="small text-muted me-2 text-truncate" style="max-width:90px;">${u.domacin}</span>
                        <input type="number" class="form-control form-control-sm score-input mx-1" style="border-color:#d4af37 !important;" value="${u.penaliDomacin || ''}" oninput="azurirajNokautRezultat('${kategorija}', '${u.id}', 'pd', this.value)" min="0" inputmode="numeric">
                        <span class="fw-bold text-warning">:</span>
                        <input type="number" class="form-control form-control-sm score-input mx-1" style="border-color:#d4af37 !important;" value="${u.penaliGost || ''}" oninput="azurirajNokautRezultat('${kategorija}', '${u.id}', 'pg', this.value)" min="0" inputmode="numeric">
                        <span class="small text-muted ms-2 text-truncate" style="max-width:90px;">${u.gost}</span>
                    </div>
                `;
            }

            if (u.penaliDomacin !== "" && u.penaliGost !== "" && u.penaliDomacin !== null && u.penaliGost !== null) {
                const pobTim = parseInt(u.penaliDomacin) > parseInt(u.penaliGost) ? u.domacin : u.gost;
                ispisHtml += `<div class="text-success small fw-bold mt-1">(${u.golDomacin}:${u.golGost}) nakon penala: <strong>${u.penaliDomacin}:${u.penaliGost}</strong> - Prolazi <u>${pobTim}</u></div>`;
            } else if (!isAdmin) {
                ispisHtml += `<div class="text-warning small fw-bold mt-1">Čeka se izvođenje penala...</div>`;
            }
            
            ispisHtml += `</div>`;
        }

        ispisHtml += `</div>`;
    });
    return ispisHtml;
}

async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);                    
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function adminPrijava() {
    if(isAdmin) {
        isAdmin = false;
        document.getElementById('statusAdmin').classList.add('d-none');
        document.getElementById('btnReset').classList.add('d-none');
        document.getElementById('btnPrijava').innerText = "Admin Prijava";
        prikaziSve();
        return;
    }
    const lozinka = prompt("Unesi lozinku za administraciju:");
    if (lozinka !== null) {
        const uneseniHash = await sha256(lozinka);
        if (uneseniHash === ADMIN_HASH) {
            isAdmin = true;
            document.getElementById('statusAdmin').classList.remove('d-none');
            document.getElementById('btnReset').classList.remove('d-none');
            document.getElementById('btnPrijava').innerText = "Odjavi se (Pregled)";
            prikaziSve();
        } else { alert("Pogrešna lozinka!"); }
    }
}

function resetujSveBaza() {
    if (isAdmin && confirm("Pažnja! Da li želiš obrisati SVE rezultate u bazi za cijeli turnir?")) {
        fetch(FIREBASE_URL + 'turnir.json', { method: 'PUT', body: JSON.stringify(strukturaTurnira) }).then(() => pokreniSinhronizaciju());
    }
}

pokreniSinhronizaciju();
setInterval(function() { if(!isAdmin) { pokreniSinhronizaciju(); } }, 7000);
</script>
